<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายรับ รพ. - Clinic Master 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
    :root { --primary: #ff85a2; --secondary: #4a90e2; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; margin: 0; background: linear-gradient(135deg, #8bbaf8 0%, #e0c3fc 100%); background-attachment: fixed; padding: 15px; }
    .container { max-width: 1150px; margin: auto; }

    .main-header { text-align: center; padding: 20px 0; margin-bottom: 10px; position: relative; }
    .main-header h1 { font-size: 50px; font-weight: 900; color: #fff; text-shadow: 3px 3px 0px var(--primary), 6px 6px 15px rgba(0,0,0,0.2); margin: 0; }
    .user-badge { position: absolute; top: 10px; right: 10px; background: #fff; padding: 5px 15px; border-radius: 50px; font-weight: 900; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    .nav-menu { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; padding-bottom: 5px; }
    .nav-menu button { flex: 1; min-width: 100px; padding: 15px; border: none; border-radius: 20px; background: #fff; color: var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; font-weight: 900; font-size: 16px; transition: 0.3s; white-space: nowrap; }
    .nav-menu button.active { background: var(--primary); color: #fff; }

    .page { display: none; animation: fadeIn 0.4s ease-out; }
    .box { background: rgba(255,255,255,0.95); padding: 25px; border-radius: 35px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
    h3 { color: var(--primary); text-align: center; font-weight: 900; font-size: 28px; margin: 0 0 20px 0; }

    .u-input { width: 100%; height: 55px; font-size: 20px; font-weight: 900; border: 2px solid #eee; border-radius: 15px; text-align: center; margin-bottom: 12px; outline: none; font-family: 'Kanit'; background-color: white; color: #444; }
    input[type="date"].pink-date { color: var(--primary); border: 2.5px solid var(--primary); cursor: pointer; padding: 5px 15px; }

    .dropdown-container { position: relative; width: 100%; }
    .dropdown-list { 
        position: absolute; top: 100%; left: 0; right: 0; 
        background: white; border-radius: 15px; border: 2px solid var(--primary);
        max-height: 350px; overflow-y: auto; z-index: 2000; 
        display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        margin-top: -10px;
    }
    .dropdown-item { padding: 12px; cursor: pointer; font-weight: 900; font-size: 18px; text-align: center; border-bottom: 1px solid #eee; color: #000 !important; }
    .dropdown-item:hover { background-color: var(--primary); color: white !important; }

    .bold-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .bold-table th { color: #333; font-size: 18px; font-weight: 900; padding: 15px 5px; border-bottom: 3px solid #ddd; background: #f9f9f9; text-align: center; }
    .bold-table td { padding: 15px 5px; border-bottom: 1px solid #eee; text-align: center; font-weight: 900; font-size: 19px; color: #222; }
    .calc-in { width: 90%; height: 48px; font-size: 22px; font-weight: 900; border: 2.5px solid var(--primary); border-radius: 12px; text-align: center; background: #f0f4ff; outline: none; }
    .res { color: var(--primary) !important; font-size: 22px !important; font-weight: 900 !important; }

    .mini-summary { background: #fff5f7; padding: 20px; border-radius: 0 0 35px 35px; margin: 0 -25px -25px -25px; border-top: 3px dashed var(--primary); }
    .sum-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .sum-label { font-size: 22px; font-weight: 900; color: #222; }
    .sum-val { font-size: 28px; font-weight: 900; color: var(--primary); }

    .dashboard { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; min-height: 260px; }
    .stat-card { 
        flex: 1; background: #fff; border-radius: 30px; padding: 15px; 
        height: 160px; display: flex; flex-direction: column; align-items: center; 
        justify-content: center; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        cursor: pointer; order: 2; 
    }
    .stat-card.active { 
        flex: 1.6; height: 230px; border: 3.5px solid var(--primary); 
        box-shadow: 0 20px 40px rgba(255,133,162,0.3); transform: scale(1.05); 
        order: 1; 
    }
    .stat-value { color: #444; font-size: 30px; font-weight: 900; }
    .active .stat-value { color: var(--secondary); font-size: 55px; }

    .btn-del { color: red; border: 2px solid red; border-radius: 12px; padding: 8px 15px; background: white; font-weight: 900; cursor: pointer; }
    .btn-lock { background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: 900; cursor: pointer; }
    .btn-unlock { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 15px; font-weight: 900; cursor: pointer; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
</style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h1>รายรับ รพ.</h1>
        <div class="user-badge" id="displayUserName">👤 Jaokha</div>
    </div>

    <div class="nav-menu">
        <button id="nav-home" onclick="showPage('home')">บันทึก 📝</button>
        <button id="nav-calc" onclick="showPage('calc')">ฟาร์ม/เหมือง 🌱</button>
        <button id="nav-total" onclick="showPage('total')">รวมยอด 💰</button>
        <button id="nav-history" onclick="showPage('history')">ประวัติ 📜</button>
    </div>

    <div id="home" class="page">
        <div class="box" style="max-width: 500px; margin: auto;">
            <h3>ลงบันทึกเคส</h3>
            <input type="date" id="recordDate" class="u-input pink-date" onchange="syncDate(this.value)">
            <select id="mainCategory" class="u-input" onchange="handleCategoryChange()">
                <option value="">-- เลือกรายการ --</option>
                <option value="ยาแก้">ยาแก้</option>
                <option value="ศัลยกรรม">ศัลยกรรม</option>
                <option value="เพน">เพน</option>
            </select>
            <div class="dropdown-container" id="subCategoryContainer" style="display:none;">
                <input type="text" id="subCategoryDisplay" class="u-input" style="border-color:var(--secondary);" placeholder="เลือกรายชื่อยาแก้..." readonly onclick="toggleSubDropdown()">
                <div id="subCategoryDropdown" class="dropdown-list"></div>
            </div>
            <div class="dropdown-container">
                <input type="text" id="buyer" class="u-input" placeholder="🔍 พิมพ์ชื่อแก๊ง/แฟม..." oninput="filterGangs()" onfocus="showGangs()" autocomplete="off">
                <div id="gangDropdown" class="dropdown-list"></div>
            </div>
            <select id="sellerSelect" class="u-input"><option value="">กำลังโหลดรายชื่อหมอ...</option></select>
            <div style="display:flex; gap:10px;">
                <input id="pQty" class="u-input" type="number" placeholder="แพ็ค" oninput="updateLive()">
                <input id="sQty" class="u-input" type="number" placeholder="ชิ้น" oninput="updateLive()">
            </div>
            <div id="liveTotal" style="text-align:center; font-size:60px; font-weight:900; color:var(--primary); margin:15px 0;">0</div>
            <button id="btnSave" style="background:var(--primary); color:#fff; padding:20px; border:none; border-radius:20px; width:100%; font-weight:900; font-size:24px; cursor:pointer;" onclick="saveData()">บันทึกข้อมูล ✨</button>
            <div id="lockMsg" style="display:none; text-align:center; background:#ffebee; color:red; padding:15px; border-radius:15px; font-weight:bold; margin-top:10px;">🔒 วันนี้ถูกปิดยอดงานแล้ว</div>
        </div>
    </div>

    <div id="total" class="page">
        <div style="text-align:center; margin-bottom:15px;">
            <input type="date" id="dashDate" class="u-input pink-date" style="max-width:250px; border-radius:50px;" onchange="syncDate(this.value)">
        </div>
        <div class="dashboard" id="mainDash">
            <div class="stat-card" id="card-day" style="order: 0;" onclick="swapDash('day')">
                <div style="font-size:20px; font-weight:900;">รายวัน</div>
                <div class="stat-value" id="val-day">0</div>
            </div>
            <div class="stat-card active" id="card-month" style="order: 1;" onclick="swapDash('month')">
                <div style="font-size:20px; font-weight:900;">รายเดือน</div>
                <div class="stat-value" id="val-month">0</div>
            </div>
            <div class="stat-card" id="card-year" style="order: 2;" onclick="swapDash('year')">
                <div style="font-size:20px; font-weight:900;">รายปี</div>
                <div class="stat-value" id="val-year">0</div>
            </div>
        </div>
        <div class="box"><div id="sellerGrid"></div></div>
    </div>

    <div id="calc" class="page"><div class="box"><h3>🌱 ฟาร์มหายนะ</h3><table class="bold-table"><thead><tr><th style="width:25%">สินค้า</th><th style="width:15%">เรท</th><th style="width:20%">แพ็ค</th><th style="width:20%">ชิ้น</th><th style="width:20%">เงิน</th></tr></thead><tbody id="farmBody"></tbody></table><div class="mini-summary"><div class="sum-line"><span class="sum-label">📦 รวมจำนวน:</span><span class="sum-val" id="fQty">0</span></div><div class="sum-line"><span class="sum-label">💰 เงินฟาร์มรวม:</span><span class="sum-val" id="fMoney">0</span></div></div></div><div class="box"><h3>⛏️ เหมืองหายนะ</h3><table class="bold-table"><thead><tr><th style="width:25%">สินค้า</th><th style="width:15%">เรท</th><th style="width:20%">แพ็ค</th><th style="width:20%">ชิ้น</th><th style="width:20%">เงิน</th></tr></thead><tbody id="mineBody"></tbody></table><div class="mini-summary"><div class="sum-line"><span class="sum-label">📦 รวมจำนวน:</span><span class="sum-val" id="mQty">0</span></div><div class="sum-line"><span class="sum-label">💰 เงินเหมืองรวม:</span><span class="sum-val" id="mMoney">0</span></div></div></div></div>
    <div id="history" class="page"><div class="box"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><h3>📜 ประวัติการขาย</h3><input type="date" id="histDate" class="u-input pink-date" style="max-width:220px; border-radius:50px;" onchange="syncDate(this.value)"></div><div id="adminLockControl" style="text-align:center; margin-bottom:20px;"></div><div style="overflow-x:auto;"><table class="bold-table" style="width:100%; min-width:900px;"><thead><tr><th>ลำดับ</th><th>รายการ</th><th>คนซื้อ</th><th>จำนวน</th><th>เงินรวม</th><th>คนขาย</th><th>จัดการ</th></tr></thead><tbody id="histBody"></tbody></table></div></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDErmAM7dA7NJ19jPLGgqKEqLpFW2wdN0",
      authDomain: "emss-ebb6e.firebaseapp.com",
      databaseURL: "https://emss-ebb6e-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "emss-ebb6e",
      appId: "1:154198162358:web:f16c1ffd840ceaa8845f17"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const salesRef = ref(db, 'sales_data'), gangRef = ref(db, 'gang_list'), priceRef = ref(db, 'service_prices'), usersRef = ref(db, 'portal_users'), marketRef = ref(db, 'market_items'), lockRef = ref(db, 'closed_days');

    let sales = [], closedDays = {}, gangs = [], priceList = {}, currentSubValue = "";
    
    // --- 🔒 ระบบเช็คสิทธิ์แบบ Real-time 🔒 ---
    const SUPER_ADMIN = "Jaokha";
    let currentUser = localStorage.getItem('portalUser') || null;
    let userData = {}; // เก็บข้อมูลสิทธิ์ผู้ใช้แบบ Real-time

    if (currentUser) {
        onValue(ref(db, `portal_users/${currentUser}`), (snap) => {
            userData = snap.val() || {};
            checkLockStatus(); // รีเฟรชปุ่มล็อคเมื่อสิทธิ์เปลี่ยน
            renderHistory();   // รีเฟรชปุ่มลบเมื่อสิทธิ์เปลี่ยน
        });
    }

    async function checkPermission() {
        if (!currentUser) {
            alert("❌ กรุณาเข้าสู่ระบบก่อนทำรายการ");
            return false;
        }
        // เช็คจาก userData ที่ดึงมา Real-time หรือเป็น Super Admin
        if (userData.isAdmin || userData.canEdit || currentUser === SUPER_ADMIN) {
            return true;
        }
        alert("⚠️ คุณไม่มียศหรือสิทธิ์ในการดำเนินการ (ติดต่อ Admin)");
        return false;
    }

    onValue(priceRef, (snap) => { priceList = snap.val() || {}; });

    window.handleCategoryChange = () => {
        const mainCat = document.getElementById('mainCategory').value;
        const container = document.getElementById('subCategoryContainer');
        const list = document.getElementById('subCategoryDropdown');
        if (mainCat === "ยาแก้") {
            container.style.display = "block";
            let html = "";
            Object.keys(priceList).sort().forEach(k => {
                if (k.includes("ยาแก้") || k.includes("ยากัน") || k.includes("รักษา")) {
                    html += `<div class="dropdown-item" onclick="selectSubItem('${k}')">${k}</div>`;
                }
            });
            list.innerHTML = html;
            setTimeout(() => { list.style.display = "block"; }, 50);
            document.getElementById('subCategoryDisplay').value = "";
            currentSubValue = "";
        } else {
            container.style.display = "none";
            list.style.display = "none";
            currentSubValue = "";
        }
        updateLive();
    };

    window.toggleSubDropdown = () => {
        const list = document.getElementById('subCategoryDropdown');
        list.style.display = list.style.display === "block" ? "none" : "block";
    };

    window.selectSubItem = (val) => {
        document.getElementById('subCategoryDisplay').value = val;
        currentSubValue = val;
        document.getElementById('subCategoryDropdown').style.display = "none";
        updateLive();
    };

    window.swapDash = (target) => {
        const cards = { day: document.getElementById('card-day'), month: document.getElementById('card-month'), year: document.getElementById('card-year') };
        Object.values(cards).forEach(c => c.classList.remove('active'));
        if (target === 'day') { cards.day.classList.add('active'); cards.day.style.order = "1"; cards.month.style.order = "0"; cards.year.style.order = "2"; } 
        else if (target === 'month') { cards.month.classList.add('active'); cards.day.style.order = "0"; cards.month.style.order = "1"; cards.year.style.order = "2"; } 
        else if (target === 'year') { cards.year.classList.add('active'); cards.day.style.order = "0"; cards.month.style.order = "2"; cards.year.style.order = "1"; }
    };

    window.updateLive = () => {
        const mainCat = document.getElementById('mainCategory').value;
        const type = (mainCat === "ยาแก้") ? currentSubValue : mainCat;
        const buyer = document.getElementById('buyer').value;
        const pQty = parseInt(document.getElementById('pQty').value) || 0;
        const sQty = parseInt(document.getElementById('sQty').value) || 0;
        if (!type || !priceList[type]) { document.getElementById('liveTotal').innerText = "0"; return; }
        const itemData = priceList[type], p = itemData.prices, packData = itemData.packs || {};
        let ps = 1;
        if (buyer === "ประชาชน") ps = packData.citizen || 1;
        else if (window.sortedGangs?.gangs?.includes(buyer)) ps = packData.gang || 1;
        else ps = packData.fam || packData.family || 1;
        const totalQty = (pQty * ps) + sQty;
        let unitPrice = p.fam || p.family || 0;
        if (buyer === "ประชาชน") unitPrice = p.citizen || 0;
        else if (window.sortedGangs?.gangs?.includes(buyer)) unitPrice = p.gang || 0;
        document.getElementById('liveTotal').innerText = (unitPrice * totalQty).toLocaleString();
    };

    window.saveData = async () => {
        if(!(await checkPermission())) return; 
        const date = document.getElementById('recordDate').value;
        if(closedDays[date]) return;
        const mainCat = document.getElementById('mainCategory').value, type = (mainCat === "ยาแก้") ? currentSubValue : mainCat;
        const seller = document.getElementById('sellerSelect').value, buyer = document.getElementById('buyer').value;
        if(!type || !seller || !buyer) return alert("กรอกข้อมูลไม่ครบ");
        const itemData = priceList[type], packData = itemData.packs || {};
        let ps = 1;
        if (buyer === "ประชาชน") ps = packData.citizen || 1;
        else if (window.sortedGangs?.gangs?.includes(buyer)) ps = packData.gang || 1;
        else ps = packData.fam || packData.family || 1;
        const totalQty = (parseInt(document.getElementById('pQty').value)||0)*ps + (parseInt(document.getElementById('sQty').value)||0);
        const totalMoney = parseInt(document.getElementById('liveTotal').innerText.replace(/,/g,''));
        push(salesRef, { date, type, seller, buyer, qty: totalQty, total: totalMoney });
        document.getElementById('pQty').value = ""; document.getElementById('sQty').value = ""; document.getElementById('liveTotal').innerText = "0";
        document.getElementById('mainCategory').value = ""; handleCategoryChange();
    };

    onValue(usersRef, (snap) => {
        const users = snap.val(), sel = document.getElementById('sellerSelect');
        sel.innerHTML = '<option value="">-- เลือกชื่อหมอ --</option>';
        if(users) Object.entries(users).filter(([n, d]) => d.canEdit === true).sort((a,b)=>a[0].localeCompare(b[0],'th')).forEach(([n]) => {
            let opt = document.createElement('option'); opt.value = n; opt.text = n; sel.add(opt);
        });
        if(currentUser) document.getElementById('displayUserName').innerText = `👤 ${currentUser}`;
    });

    onValue(marketRef, (snap) => { renderMarket(snap.val() || {}); });
    onValue(salesRef, (snap) => { sales = snap.val() ? Object.entries(snap.val()).map(([k, v]) => ({...v, firebaseKey: k})) : []; renderTotal(); renderHistory(); });
    onValue(lockRef, (snap) => { closedDays = snap.val() || {}; checkLockStatus(); renderHistory(); });
    onValue(gangRef, (snap) => {
        const data = snap.val(); let fL = [], gL = [];
        if(data) Object.values(data).forEach(i => { if(i && i.name) (i.type === "gang") ? gL.push(i.name) : fL.push(i.name); });
        fL.sort((a,b)=>a.localeCompare(b,'th')); gL.sort((a,b)=>a.localeCompare(b,'th'));
        gangs = ["ประชาชน", ...gL, ...fL]; window.sortedGangs = { families: fL, gangs: gL };
    });

    window.showGangs = () => {
        const list = document.getElementById('gangDropdown'); list.innerHTML = ""; list.style.display = "block";
        let h = `<div class="dropdown-item" onclick="selectGang('ประชาชน')">ประชาชน</div>`;
        if(window.sortedGangs.gangs.length > 0) { h += `<div style="background:#f0f7ff; color:#4a90e2; padding:10px; font-weight:900;">🛡️ GANG</div>`; window.sortedGangs.gangs.forEach(g => h += `<div class="dropdown-item" onclick="selectGang('${g}')">${g}</div>`); }
        if(window.sortedGangs.families.length > 0) { h += `<div style="background:#fff0f3; color:#ff85a2; padding:10px; font-weight:900;">🌸 FAMILY</div>`; window.sortedGangs.families.forEach(g => h += `<div class="dropdown-item" onclick="selectGang('${g}')">${g}</div>`); }
        list.innerHTML = h;
    };
    window.selectGang = (v) => { document.getElementById('buyer').value = v; document.getElementById('gangDropdown').style.display = "none"; updateLive(); };
    window.filterGangs = () => {
        const v = document.getElementById('buyer').value.toLowerCase(), list = document.getElementById('gangDropdown'), f = gangs.filter(g => g.toLowerCase().includes(v));
        if(f.length > 0) { list.style.display = "block"; list.innerHTML = f.map(g => `<div class="dropdown-item" onclick="selectGang('${g}')">${g}</div>`).join(''); } else list.style.display = "none";
    };
    window.renderMarket = (mI) => {
        let fH = "", mH = "";
        Object.entries(mI).forEach(([id, item]) => {
            const row = `<tr><td>${item.name}</td><td style="color:var(--secondary)">${item.rate.toLocaleString()}</td><td><input type="number" class="calc-in" oninput="calcMarket()" data-rate="${item.rate}" data-pack="${item.pack || 1}" data-type="p"></td><td><input type="number" class="calc-in" oninput="calcMarket()" data-rate="${item.rate}" data-type="s"></td><td class="res">0</td></tr>`;
            item.category === "farm" ? fH += row : mH += row;
        });
        document.getElementById('farmBody').innerHTML = fH || "<tr><td colspan='5'>ไม่มีข้อมูล</td></tr>";
        document.getElementById('mineBody').innerHTML = mH || "<tr><td colspan='5'>ไม่มีข้อมูล</td></tr>";
    };
    window.calcMarket = () => {
        let fQ = 0, fM = 0, mQ = 0, mM = 0;
        document.querySelectorAll('#farmBody tr').forEach(tr => { const pI = tr.querySelector('[data-type="p"]'); if(!pI) return; const p=parseInt(pI.value)||0, s=parseInt(tr.querySelector('[data-type="s"]').value)||0, r=parseInt(pI.dataset.rate)||0, ps=parseInt(pI.dataset.pack)||1, tQ=(p*ps)+s, tM=tQ*r; tr.querySelector('.res').innerText=tM.toLocaleString(); fQ+=tQ; fM+=tM; });
        document.querySelectorAll('#mineBody tr').forEach(tr => { const pI = tr.querySelector('[data-type="p"]'); if(!pI) return; const p=parseInt(pI.value)||0, s=parseInt(tr.querySelector('[data-type="s"]').value)||0, r=parseInt(pI.dataset.rate)||0, ps=parseInt(pI.dataset.pack)||1, tQ=(p*ps)+s, tM=tQ*r; tr.querySelector('.res').innerText=tM.toLocaleString(); mQ+=tQ; mM+=tM; });
        document.getElementById('fQty').innerText=fQ.toLocaleString(); document.getElementById('fMoney').innerText=fM.toLocaleString(); document.getElementById('mQty').innerText=mQ.toLocaleString(); document.getElementById('mMoney').innerText=mM.toLocaleString();
    };
    window.renderTotal = () => {
        const d = document.getElementById('dashDate').value; let dS=0, mS=0, yS=0, drs={};
        sales.forEach(s => { if(s.date === d) { dS+=s.total; drs[s.seller]=(drs[s.seller]||0)+s.total; } if(s.date.startsWith(d.slice(0,7))) mS+=s.total; if(s.date.startsWith(d.slice(0,4))) yS+=s.total; });
        document.getElementById('val-day').innerText=dS.toLocaleString(); document.getElementById('val-month').innerText=mS.toLocaleString(); document.getElementById('val-year').innerText=yS.toLocaleString();
        let h = ""; Object.keys(drs).sort((a,b)=>a.localeCompare(b,'th')).forEach(n => h += `<div style="display:flex; justify-content:space-between; padding:15px; background:#fff; border-radius:15px; margin-bottom:8px; font-weight:900;"><span>${n}</span><span style="color:var(--primary)">${drs[n].toLocaleString()}</span></div>`);
        document.getElementById('sellerGrid').innerHTML = h || "ไม่มีข้อมูล";
    };
    window.renderHistory = () => {
        const d = document.getElementById('histDate').value, isL = closedDays[d] === true; let h = "", c = 1;
        // เช็คสิทธิ์ลบป้ายประกาศแบบ Real-time
        const iCanDelete = userData.canDelete || currentUser === SUPER_ADMIN;

        sales.filter(s => s.date === d).forEach(s => { 
            const bS = (isL || !iCanDelete) ? 'style="opacity:0.5; cursor:not-allowed; border-color:gray; color:gray;"' : ''; 
            h += `<tr><td>${c++}</td><td>${s.type}</td><td>${s.buyer}</td><td>${s.qty.toLocaleString()}</td><td style="color:var(--primary)">${s.total.toLocaleString()}</td><td>${s.seller}</td><td><button class="btn-del" ${bS} onclick="delById('${s.firebaseKey}', '${s.date}')">ลบ</button></td></tr>`; 
        });
        document.getElementById('histBody').innerHTML = h || "<tr><td colspan='7'>ไม่มีข้อมูล</td></tr>";
    };
    window.delById = async (k, rD) => { 
        if(!(await checkPermission())) return;
        if(!userData.canDelete && currentUser !== SUPER_ADMIN) return alert("⚠️ คุณไม่มียศสำหรับลบข้อมูล");
        if(closedDays[rD]) return alert("🔒 ปิดยอดแล้ว"); 
        if(confirm("ลบรายการนี้?")) remove(ref(db, `sales_data/${k}`)); 
    };
    window.checkLockStatus = () => {
        const d = document.getElementById('recordDate').value, isL = closedDays[d] === true;
        document.getElementById('btnSave').style.display = isL ? 'none' : 'block'; document.getElementById('lockMsg').style.display = isL ? 'block' : 'none';
        const aC = document.getElementById('adminLockControl'); 
        if(aC) { 
            // เช็คสิทธิ์ปิดงาน: ต้องเป็น Super Admin หรือมี isAdmin
            if(currentUser === SUPER_ADMIN || userData.isAdmin) { 
                aC.style.display = "block"; aC.innerHTML = `<button class="${isL?'btn-unlock':'btn-lock'}" onclick="toggleLock('${d}', ${!isL})">${isL?'🔓 เปิดงาน':'🔒 ปิดงาน'}</button>`; 
            } else aC.style.display = "none"; 
        }
    };
    window.toggleLock = (d, s) => set(ref(db, `closed_days/${d}`), s);
    window.syncDate = (v) => { document.getElementById('recordDate').value=v; document.getElementById('dashDate').value=v; document.getElementById('histDate').value=v; checkLockStatus(); renderTotal(); renderHistory(); };
    window.showPage = (p) => { document.querySelectorAll('.page').forEach(x => x.style.display = 'none'); document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active')); document.getElementById(p).style.display = 'block'; document.getElementById('nav-' + p).classList.add('active'); };
    window.onload = () => { syncDate(new Date().toLocaleDateString('sv-SE')); showPage('home'); };
    document.addEventListener('click', (e) => { 
        if (!e.target.closest('.dropdown-container')) { 
            const dd = document.getElementById('gangDropdown'); if(dd) dd.style.display = 'none'; 
            const sd = document.getElementById('subCategoryDropdown'); if(sd) sd.style.display = 'none';
        } 
    });
</script>
</body>
</html>
