<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ประกาศ</title>

<style>

:root { --primary: #ff85a2; --secondary: #4a90e2; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; margin: 0; background: linear-gradient(135deg, #77a9eb 0%, #e06c8f 100%); background-attachment: fixed; padding: 15px; }
    .container { max-width: 1150px; margin: auto; }

/* 1. ทำให้แถบหัวข้อโปร่งใส */
h1 {
    text-align: center;
    background: transparent;
    color: white;
    padding: 18px;
    margin: 0;
    font-size: 26px;
    letter-spacing: 2px;
}

/* 2. ทำให้แถบเมนูปุ่มกดโปร่งใส */
.menu {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    background: transparent;
}

.menu button{
    padding:10px 18px;
    border:none;
    background:#f08aa7;
    color:white;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    transition: 0.3s;
}

.menu button:hover {
    background: #ff6f9c;
    transform: translateY(-2px);
}

.page{
    display:none;
    padding:30px;
}

.box{
    max-width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

input,select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:14px;
    border-radius:10px;
    border:1px solid #ffc2d3;
    background:#fff5f8;
    font-family: 'Kanit', sans-serif;
}

button.action{
    background:#ff6f9c;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight: bold;
}

button.copy{
    margin-top:6px;
    background:#ffb3c8;
    border:none;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
    transition: background 0.3s, color 0.3s;
}

/* สไตล์ปุ่มตอนคัดลอกสำเร็จ */
button.copy.success {
    background: #28a745 !important;
    color: white !important;
}

.log{
    background:#fff7fb;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
    white-space:pre-wrap;
    border:1px solid #ffd0df;
    font-family: 'Kanit', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
}

.ruleItem{
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
    padding: 5px;
    border-bottom: 1px dashed #ffd0df;
}

/* ปรับปรุงหน้าบันทึกประกาศ */
.history-item {
    background: #fff;
    border: 1px solid #ffd0df;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 15px;
    position: relative;
    box-shadow: 0 2px 8px rgba(255, 133, 162, 0.1);
}

.history-time {
    color: #ff6f9c;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 5px;
}

.history-user {
    background: #ffeef2;
    color: #ff6f9c;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid #ffccd5;
}

.history-text {
    color: #444;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 10px;
    padding-right: 40px;
}

.delete-log-btn {
    position: absolute;
    right: 15px;
    bottom: 15px;
    background: #ffe5ed;
    color: #ff4d4d;
    border: 1px solid #ffccd5;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.delete-log-btn:hover {
    background: #ff4d4d;
    color: white;
}

/* สไตล์เพิ่มเติมสำหรับหน้าจัดการ */
.manage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
.delete-btn { background: #ff4d4d; color: white; border: none; border-radius: 5px; cursor: pointer; padding: 2px 8px; }

/* สีพิเศษสำหรับหัวข้อกฎ */
.text-danger { color: #ff0000 !important; font-weight: bold; }
.text-normal { color: #333; }
optgroup { font-weight: bold; color: #ff6f9c; background: #fff0f5; }

/* CSS ใหม่สำหรับ Toggle Fam/Gang */
.type-container { display: flex; gap: 8px; margin-bottom: 10px; margin-top: 5px; }
.type-btn { flex: 1; padding: 8px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: bold; border: 2px solid transparent; text-align: center; transition: 0.2s; }
.active-fam { background: #fff5f8; color: var(--primary); border-color: var(--primary); }
.active-gang { background: #f0f7ff; color: var(--secondary); border-color: var(--secondary); }
.inactive { background: #f1f5f9; color: #94a3b8; }

</style>
</head>


<body>

<h1>⚙️ ประกาศ Time Town ⚙️</h1>

<div class="menu">
<button onclick="showPage('warnPage')">ประกาศตักเตือน</button>
<button onclick="showPage('coolPage')">ประกาศคูลดาวน์</button>
<button onclick="showPage('casePage')">ไม่พบเคสสลบ</button>
<button onclick="showPage('logPage')">บันทึกประกาศ</button>
</div>

<div id="warnPage" class="page">
<div class="box">

<h2>📢 ประกาศตักเตือน</h2>

<label>เลือกประเภท</label>
<div class="type-container">
    <div id="warnTypeFam" class="type-btn active-fam" onclick="setSelectType('warn', 'fam')">🌸 FAMILY</div>
    <div id="warnTypeGang" class="type-btn inactive" onclick="setSelectType('warn', 'gang')">🛡️ GANG</div>
</div>

<label>เลือกตระกูล</label>
<select id="gang"></select>

<label>เตือนครั้งที่</label>
<select id="warnLevel">
<option value="1">ครั้งที่ 1</option>
<option value="2">ครั้งที่ 2</option>
</select>

<label>เลือกข้อกฎ</label>
<select id="ruleSelect">
    <option value="">-- โปรดเลือกข้อกฎจากระบบ --</option>
    </select>

<button class="action" onclick="addRule()">เพิ่มข้อ</button>
<div id="ruleList" class="log"></div>

<label>เนื่องจาก</label>
<input id="reason">

<label>ค่าปรับ</label>
<input id="fine">

<label>สถานะ</label>
<select id="status">
<option selected>ยังไม่ชำระ</option>
<option>ชำระแล้ว</option>
</select>

<button class="action" onclick="warn()">สร้างประกาศ</button>

<h3>📢 FiveM</h3>
<div id="warnFiveM" class="log"></div>
<button class="copy" onclick="copyText('warnFiveM',this)">คัดลอก</button>

<h3>💬 Discord</h3>
<div id="warnDiscord" class="log"></div>
<button class="copy" onclick="copyText('warnDiscord',this)">คัดลอก</button>

</div>
</div>

<div id="coolPage" class="page">
<div class="box">

<h2>⏱ ประกาศคูลดาวน์</h2>

<label>เลือกประเภท</label>
<div class="type-container">
    <div id="coolTypeFam" class="type-btn active-fam" onclick="setSelectType('cool', 'fam')">🌸 FAMILY</div>
    <div id="coolTypeGang" class="type-btn inactive" onclick="setSelectType('cool', 'gang')">🛡️ GANG</div>
</div>

<label>เลือกตระกูล</label>
<select id="coolGang"></select>

<button class="action" onclick="cooldown()">สร้างประกาศ</button>

<h3>📢 FiveM</h3>
<div id="coolFiveM" class="log"></div>
<button class="copy" onclick="copyText('coolFiveM',this)">คัดลอก</button>

<h3>💬 Discord</h3>
<div id="coolDiscord" class="log"></div>
<button class="copy" onclick="copyText('coolDiscord',this)">คัดลอก</button>

</div>
</div>

<div id="casePage" class="page">
<div class="box">

<h2>🚑 ไม่พบเคสสลบ</h2>

<label>เบอร์โทร</label>
<input id="casePhone">

<button class="action" onclick="caseMsg()">สร้างข้อความ</button>

<h3>📢 FiveM</h3>
<div id="caseGame" class="log"></div>
<button class="copy" onclick="copyText('caseGame',this)">คัดลอก</button>
    
<h3>💬 Discord</h3>
<div id="caseDiscord" class="log"></div>
<button class="copy" onclick="copyText('caseDiscord',this)">คัดลอก</button>

</div>
</div>

<div id="logPage" class="page">
<div class="box" style="max-width: 800px;">
<h2>📜 บันทึกประกาศ</h2>
<div id="history"></div>
</div>
</div>

<script type="module">
// --- 1. Firebase Setup ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
      apiKey: "AIzaSyDErmAM7dA7NJ19jPLGgqKEqLpFW2qwdN0",
      authDomain: "emss-ebb6e.firebaseapp.com",
      projectId: "emss-ebb6e",
      databaseURL: "https://emss-ebb6e-default-rtdb.asia-southeast1.firebasedatabase.app/",
      appId: "1:154198162358:web:f16c1ffd840ceaa8845f17"
    };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const logRef = ref(db, 'announcement_logs');
const gangListRef = ref(db, 'gang_list');
const ruleListRef = ref(db, 'rule_list');

function customSort(a, b) {
    return a.localeCompare(b, 'th', { numeric: true, sensitivity: 'base' });
}

// --- ฟังก์ชันดึงชื่ออัตโนมัติ (เก็บไว้ใช้หลังบ้าน) ---
function getAutoUser() {
    return localStorage.getItem('portalUser') || "ไม่ระบุชื่อ";
}

// --- ตัวแปรเก็บประเภทที่เลือก ---
let currentWarnType = 'fam';
let currentCoolType = 'fam';
let allGangsData = {};

window.setSelectType = function(page, type) {
    if(page === 'warn') {
        currentWarnType = type;
        document.getElementById('warnTypeFam').className = type === 'fam' ? 'type-btn active-fam' : 'type-btn inactive';
        document.getElementById('warnTypeGang').className = type === 'gang' ? 'type-btn active-gang' : 'type-btn inactive';
    } else {
        currentCoolType = type;
        document.getElementById('coolTypeFam').className = type === 'fam' ? 'type-btn active-fam' : 'type-btn inactive';
        document.getElementById('coolTypeGang').className = type === 'gang' ? 'type-btn active-gang' : 'type-btn inactive';
    }
    renderGangSelects();
}

function renderGangSelects() {
    const gangSelect = document.getElementById('gang');
    const coolSelect = document.getElementById('coolGang');
    
    if(gangSelect) gangSelect.innerHTML = "";
    if(coolSelect) coolSelect.innerHTML = "";

    const sortedGangs = Object.keys(allGangsData).map(key => ({
        name: typeof allGangsData[key] === 'object' ? allGangsData[key].name : allGangsData[key],
        type: typeof allGangsData[key] === 'object' ? allGangsData[key].type : 'fam',
        selected: typeof allGangsData[key] === 'object' ? (allGangsData[key].selected !== false) : true
    })).sort((a, b) => customSort(a.name, b.name));

    sortedGangs.forEach(item => {
        if (item.selected) {
            if (item.type === currentWarnType && gangSelect) {
                const opt = document.createElement('option');
                opt.value = item.name;
                opt.textContent = item.name;
                gangSelect.appendChild(opt);
            }
            if (item.type === currentCoolType && coolSelect) {
                const opt = document.createElement('option');
                opt.value = item.name;
                opt.textContent = item.name;
                coolSelect.appendChild(opt);
            }
        }
    });
}

// --- Sync Portal Data ---
function syncPortalData() {
    onValue(gangListRef, (snapshot) => {
        allGangsData = snapshot.val() || {};
        renderGangSelects();
    });

    onValue(ruleListRef, (snapshot) => {
        const rulesData = snapshot.val();
        const select = document.getElementById('ruleSelect');
        
        if (select) select.innerHTML = '<option value="">-- โปรดเลือกข้อกฎจากระบบ --</option>';

        if (rulesData) {
            const sortedRules = Object.keys(rulesData).map(key => ({
                key: key,
                ...rulesData[key]
            })).sort((a, b) => customSort(String(a.no), String(b.no)));

            const groups = {
                basic: document.createElement('optgroup'),
                blacklist: document.createElement('optgroup'),
                story: document.createElement('optgroup')
            };
            groups.basic.label = "-- กฎพื้นฐานโรงพยาบาล --";
            groups.blacklist.label = "-- กฎ BLACKLIST --";
            groups.story.label = "-- ทำผิดกฎ Blacklist กรณีสตอรี่ --";

            sortedRules.forEach(r => {
                const isSelected = r.selected !== false;
                const category = r.category || 'basic';
                let colorClass = (category === 'blacklist' || category === 'story') ? 'text-danger' : 'text-normal';

                if (isSelected && select) {
                    const opt = document.createElement('option');
                    opt.className = colorClass;
                    opt.value = `${r.no}|${r.fine}|${r.detail}`;
                    opt.textContent = `ข้อที่ ${r.no} ${r.detail} (${Number(r.fine).toLocaleString()})`;
                    
                    if (category === 'basic' || category === 'normal') {
                        groups.basic.appendChild(opt);
                    } else if (groups[category]) {
                        groups[category].appendChild(opt);
                    }
                }
            });
            
            if(select) {
                if(groups.basic.children.length > 0) select.appendChild(groups.basic);
                if(groups.blacklist.children.length > 0) select.appendChild(groups.blacklist);
                if(groups.story.children.length > 0) select.appendChild(groups.story);
            }
        }
    });
}
syncPortalData();

// --- 2. Global Variables & UI Functions ---
let rules=[];
let totalFine=0;

window.showPage = function(id){
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById(id).style.display="block";
}

window.addRule = function(){
    let value=document.getElementById("ruleSelect").value;
    if(!value)return;
    let data=value.split("|");
    rules.push({
        rule:data[0],
        fine:Number(data[1]),
        reason:data[2]
    });
    updateRules();
}

function updateRules(){
    let box=document.getElementById("ruleList");
    box.innerHTML="";
    totalFine=0;
    rules.forEach((r,i)=>{
        totalFine+=r.fine;
        let div=document.createElement("div");
        div.className="ruleItem";
        div.innerHTML=`ข้อ ${r.rule} (${r.fine.toLocaleString()})
        <button onclick="removeRule(${i})" style="color:red; cursor:pointer;">ลบ</button>`;
        box.appendChild(div);
    });
    document.getElementById("fine").value=totalFine.toLocaleString();
    updateReason();
}

window.removeRule = function(index){
    rules.splice(index,1);
    updateRules();
}

function updateReason(){
    let autoReason = rules.map(r=>r.reason).join(", ");
    let reasonInput=document.getElementById("reason");
    if(reasonInput.value=="" || reasonInput.dataset.auto=="true"){
        reasonInput.value=autoReason;
        reasonInput.dataset.auto="true";
    }
}

function getRuleText(){
    return rules.map(r=>r.rule).join(",");
}

function time(){
    return new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}

function date(){
    return new Date().toLocaleDateString('th-TH');
}

// --- 3. Firebase Data Handling ---

window.saveHistory = function(text){
    const user = getAutoUser(); 
    push(logRef, {
        text: text,
        user: user,
        time: time() + " " + date(),
        timestamp: Date.now()
    });
}

onValue(logRef, (snapshot) => {
    const box = document.getElementById("history");
    box.innerHTML = "";
    const data = snapshot.val();
    if(data){
        Object.keys(data).reverse().forEach(key => {
            const item = data[key];
            let div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `
                <div class="history-time">
                    <span>🕒 ${item.time}</span>
                    <span class="history-user">👤 ${item.user || 'ไม่ระบุ'}</span>
                </div>
                <div class="history-text">${item.text}</div>
                <button class="delete-log-btn" onclick="deleteLog('${key}')">🗑 ลบ</button>
            `;
            box.appendChild(div);
        });
    }
});

window.deleteLog = function(key){
    if(confirm("ยืนยันการลบรายการนี้?")){
        remove(ref(db, `announcement_logs/${key}`));
    }
}

// --- 4. Logic Functions ---

window.warn = function(){
    let gang=document.getElementById("gang").value;
    let reason=document.getElementById("reason").value;
    let fine=document.getElementById("fine").value;
    let status=document.getElementById("status").value;
    let level=document.getElementById("warnLevel").value;
    let ruleText=getRuleText();
    let statusText = status=="ชำระแล้ว" ? "+สถานะ : ชำระแล้ว" : "-สถานะ : ยังไม่ชำระ";

    // กำหนดคำนำหน้าประเภท
    let typeLabel = currentWarnType === 'fam' ? 'แก๊ง' : 'แก๊ง'; 
    if(!gang) return alert("กรุณาเลือกตระกูล");

    let fivem=`/gov ประกาศตักเตือน ${typeLabel} ${gang} เนื่องจาก ${reason} เตือนครั้งที่ ${level} รวม ตักเตือน ${level} ครั้ง ขอบคุณค่ะ/ครับ`;
    let discord=`📢 ประกาศตักเตือน\n${typeLabel} ${gang}\nเหตุผล : ${reason}\nเตือนครั้งที่ ${level}`;

    if(level==2){
        if(status=="ยังไม่ชำระ"){
            fivem=`/gov ประกาศ Blacklist ${typeLabel} ${gang} เนื่องจาก ${reason} ขอบคุณครับ/ค่ะ`;
        }else{
            fivem=`/gov ประกาศปลด Blacklist ${typeLabel} ${gang} เนื่องจาก ชำระแล้ว`;
        }
        discord=`#  ⛔  __ BLACKLIST __ ⛔\n\n\`\`\`diff\n${typeLabel} : ${gang}\nหัวข้อ : BLACKLIST ข้อที่ ${ruleText} เนื่องจาก ${reason}\n( เมื่อเวลา ${time()} น. วันที่ ${date()} )\nค่าปรับ : ${fine} TD\n${statusText}\n\`\`\`\n\n<@&1335511632587128954> <@&1364843875105243206>`;
    }
    document.getElementById("warnFiveM").innerText=fivem;
    document.getElementById("warnDiscord").innerText=discord;
}

window.cooldown = function(){
    let gang=document.getElementById("coolGang").value;
    if(!gang) return alert("กรุณาเลือกตระกูล");
    let now=new Date();
    let end=new Date(now.getTime()+10*60000);
    let start=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    let stop=end.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    let typeLabel = currentCoolType === 'fam' ? 'แก๊ง' : 'แก๊ง';
    let text=`ประกาศ รบกวน ${typeLabel} ${gang} ออกจากพื้นที่โรงพยาบาลภายใน ระยะเวลา 10 นาที เริ่มตั้งแต่เวลา ${start} ถึง ${stop} น. ขอบคุณครับ/ค่ะ`;
    document.getElementById("coolFiveM").innerText="/gov "+text;
    document.getElementById("coolDiscord").innerText=`\`\`\`\n${text}\n\`\`\`\n<@&1335511632587128954> <@&1364843875105243206>`;
}

window.caseMsg = function(){
    let phone=document.getElementById("casePhone").value;
    let game=`/gov รบกวน เบอร์ ${phone} แพทย์ไม่พบร่างผู้สลบกรุณาติดต่อ หรือ แจ้งจุดสลบ ได้เลยค่ะ/ครับ`;
    let discord=`รบกวน เบอร์ ${phone} แพทย์ไม่พบร่างผู้สลบกรุณาติดต่อ หรือ แจ้งจุดสลบ ได้เลยค่ะ/ครับ\n<@&1335511632587128954><@&1364843875105243206>`;
    document.getElementById("caseGame").innerText=game;
    document.getElementById("caseDiscord").innerText=discord;
}

window.copyText = function(id,btn){
    const text = document.getElementById(id).innerText;
    if(!text) return;
    
    navigator.clipboard.writeText(text);
    btn.innerText="คัดลอกสำเร็จ ✓";
    btn.classList.add("success");
    
    saveHistory(text);
    
    setTimeout(() => { 
        btn.innerText = "คัดลอก"; 
        btn.classList.remove("success");
    }, 2000);
}

// --- เพิ่มระบบ Enter สำหรับบันทึกข้อมูล ---
document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        const warnPage = document.getElementById('warnPage');
        const coolPage = document.getElementById('coolPage');
        const casePage = document.getElementById('casePage');

        if (warnPage.style.display === 'block') {
            warn();
        } else if (coolPage.style.display === 'block') {
            cooldown();
        } else if (casePage.style.display === 'block') {
            caseMsg();
        }
    }
});

showPage("warnPage");

</script>

</body>
</html>
